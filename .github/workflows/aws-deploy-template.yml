name: AWS Deploy Template

on:
  workflow_call:
    inputs:
      workspace:
        required: true
        type: string
      role_arn:
        description: "IAM role ARN to assume via GitHub OIDC in the target account"
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: eu-west-2

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  ########################################
  # PLAN
  ########################################
  plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: aws

    steps:
      - name: Checkout Caller Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Account Check
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="envs/${{ inputs.workspace }}.s3.tfbackend"

      - name: Select Workspace
        run: |
          terraform workspace select ${{ inputs.workspace }} || \
          terraform workspace new ${{ inputs.workspace }}

      - name: Terraform Plan
        run: |
          terraform plan \
          -var-file=envs/${{ inputs.workspace }}.tfvars \
          -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.workspace }}
          path: aws/tfplan

  ########################################
  # APPLY (WITH APPROVAL)
  ########################################
  apply:
    needs: plan
    runs-on: ubuntu-latest

    environment: tf-approve

    defaults:
      run:
        working-directory: aws

    steps:
      - name: Checkout Caller Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="envs/${{ inputs.workspace }}.s3.tfbackend"

      - name: Select Workspace
        run: |
          terraform workspace select ${{ inputs.workspace }} || \
          terraform workspace new ${{ inputs.workspace }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.workspace }}
          path: aws

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
